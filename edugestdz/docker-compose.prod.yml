# docker-compose.prod.yml
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# EDUGEST DZ — ENVIRONNEMENT PRODUCTION
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Différences vs docker-compose.yml (dev) :
#   - target: production pour tous les builds
#   - APP_ENV: production, APP_DEBUG: false
#   - Pas de pgadmin, pas de redis-commander
#   - Volumes montés en lecture seule pour le code
#   - Restart: always (pas unless-stopped)
#   - Logs vers fichiers

version: '3.9'

services:

  # ── PostgreSQL ──
  postgres:
    image: postgres:16-alpine
    container_name: edugestdz_postgres
    restart: always
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      PGDATA: /data/postgres
      TZ: Africa/Algiers
    volumes:
      - postgres_data:/data/postgres
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    expose:
      - "5432"       # pas exposé sur l'hôte en prod
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - edugestdz_net

  # ── Redis ──
  redis:
    image: redis:7-alpine
    container_name: edugestdz_redis
    restart: always
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--pass", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - edugestdz_net

  # ── Backend Laravel (Production) ──
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    image: edugestdz/backend:latest
    container_name: edugestdz_app
    restart: always
    working_dir: /var/www/html
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: ${APP_URL}
      TZ: Africa/Algiers
    env_file:
      - ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - edugestdz_net

  # ── Frontend React (Production — build statique) ──
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    image: edugestdz/frontend:latest
    container_name: edugestdz_frontend
    restart: always
    expose:
      - "80"
    networks:
      - edugestdz_net

  # ── Nginx (Reverse proxy + SSL) ──
  nginx:
    image: nginx:1.25-alpine
    container_name: edugestdz_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d/production.conf:/etc/nginx/conf.d/default.conf:ro
      - ./backend:/var/www/html:ro
      - ./backend/storage/app/public:/var/www/html/storage:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_conf:/etc/letsencrypt:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - app
      - frontend
    networks:
      - edugestdz_net

  # ── Certbot (Let's Encrypt SSL) ──
  certbot:
    image: certbot/certbot:latest
    container_name: edugestdz_certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    # Renouvellement auto toutes les 12h
    entrypoint: >
      sh -c "trap exit TERM;
             while :; do
               certbot renew --webroot -w /var/www/certbot --quiet;
               sleep 12h & wait $${!};
             done"
    networks:
      - edugestdz_net

  # ── Meilisearch ──
  meilisearch:
    image: getmeili/meilisearch:v1.8
    container_name: edugestdz_search
    restart: always
    environment:
      MEILI_MASTER_KEY: ${MEILISEARCH_KEY}
      MEILI_NO_ANALYTICS: "true"
      MEILI_ENV: production
    volumes:
      - meilisearch_data:/meili_data
    expose:
      - "7700"
    networks:
      - edugestdz_net

  # ── Queue Worker ──
  queue:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: edugestdz_queue
    restart: always
    command: php artisan queue:work redis --sleep=3 --tries=3 --max-time=3600
    env_file:
      - ./backend/.env
    depends_on:
      - app
      - redis
    networks:
      - edugestdz_net

  # ── Scheduler ──
  scheduler:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: edugestdz_scheduler
    restart: always
    command: >
      sh -c "while [ true ]; do
        php artisan schedule:run --no-interaction &
        sleep 60
      done"
    env_file:
      - ./backend/.env
    depends_on:
      - app
    networks:
      - edugestdz_net

volumes:
  postgres_data:    { driver: local }
  redis_data:       { driver: local }
  meilisearch_data: { driver: local }
  nginx_logs:       { driver: local }
  certbot_www:      { driver: local }
  certbot_conf:     { driver: local }

networks:
  edugestdz_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
